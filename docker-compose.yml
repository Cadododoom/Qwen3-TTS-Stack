services:
  qwen3-tts-customvoice:
    build:
      context: ./qwen3-tts
      dockerfile: Dockerfile
    container_name: qwen3-tts-customvoice-server
    ports:
      - "7860:7860"
    environment:
      - MODEL_NAME=Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - TTS_DEVICE=cpu
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=none
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ./hf-cache:/root/.cache/huggingface
      - ./qwen3-tts:/app
    restart: unless-stopped

  qwen3-tts-cpp:
    build:
      context: ../qwen3-tts.cpp
      dockerfile: Dockerfile.vulkan
    container_name: qwen3-tts-cpp
    ports:
      - "8090:8090"
    environment:
      - QWEN3_TTS_DEVICE=Vulkan0
      - MODEL_DIR=/models
      - MODEL_NAME=qwen3-tts-12hz-1.7b-customvoice-q8_0.gguf
      - THREADS=4
      - VOICES_DIR=/voices
      - NVIDIA_VISIBLE_DEVICES=none
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    volumes:
      - ./models:/models
      - ./voices:/voices
      - /usr/share/vulkan/icd.d:/usr/share/vulkan/icd.d:ro
      - /etc/vulkan:/etc/vulkan:ro
    restart: unless-stopped
