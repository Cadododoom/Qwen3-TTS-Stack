version: '3.8'

services:
  # Dedicated streaming API for Twilio/Hermes
  qwen3-tts-streaming:
    build:
      context: ./qwen3-tts
      dockerfile: Dockerfile
    container_name: qwen3-tts-streaming-server
    ports:
      - "8090:7860"
    environment:
      - PORT=7860
      - MODEL_NAME=Qwen/Qwen3-TTS-12Hz-0.6B-Base
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - TTS_DEVICE=privateuseone:2
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      - PYTHONUNBUFFERED=1
    devices:
      - /dev/dxg:/dev/dxg
    volumes:
      - ./hf-cache:/root/.cache/huggingface
      - ./qwen3-tts:/app
      - /usr/lib/wsl:/usr/lib/wsl
    restart: unless-stopped

  # Interactive Web Interface (Gradio Multi-Model Hub)
  qwen3-tts-web:
    build:
      context: ./qwen3-tts
      dockerfile: Dockerfile
    container_name: qwen3-tts-web-server
    ports:
      - "7860:7860"
    environment:
      - PORT=7860
      - MODEL_NAME=Qwen/Qwen3-TTS-12Hz-0.6B-Base
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - TTS_DEVICE=cpu
      - PYTHONUNBUFFERED=1
    volumes:
      - ./hf-cache:/root/.cache/huggingface
      - ./qwen3-tts:/app
    command: ["python", "app.py", "Qwen/Qwen3-TTS-12Hz-0.6B-Base", "--ip", "0.0.0.0", "--port", "7860", "--device", "cpu", "--dtype", "float32"]
    restart: unless-stopped

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:full
    container_name: llama-cpp-container
    ports:
      - "8080:8080"
    entrypoint: ["sleep", "365d"]
    volumes:
      - ./models:/models
    restart: unless-stopped
