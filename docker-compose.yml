services:
  qwen3-tts-customvoice:
    build:
      context: ./qwen3-tts
      dockerfile: Dockerfile
    container_name: qwen3-tts-customvoice-server
    ports:
      - "7860:7860"
      - "8090:8090"
    environment:
      - MODEL_NAME=Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - TTS_DEVICE=cuda
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - PYTHONUNBUFFERED=1
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ./hf-cache:/root/.cache/huggingface
      - ./qwen3-tts:/app
    deploy:
      resources:
        limits:
          cpus: '1.0'
    restart: unless-stopped

  qwen3-tts-cpp:
    build:
      context: ../qwen3-tts.cpp
      dockerfile: Dockerfile.vulkan
    container_name: qwen3-tts-cpp
    environment:
      - QWEN3_TTS_DEVICE=vulkan0
    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        limits:
          cpus: '1.0'
    restart: "no"
